name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FONTMAKE_VERSION: '3.11.1'
  NUITKA_VERSION: '4.0.1'
  PYTHON_VERSION: '3.11'

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: macos-latest       # Apple Silicon runner
            classifier: macos-arm64
            binary-name: fontmake
          - os: macos-15-intel     # Intel runner
            classifier: macos-x64
            binary-name: fontmake
          - os: ubuntu-latest
            classifier: linux-x64
            binary-name: fontmake
          - os: ubuntu-24.04-arm
            classifier: linux-arm64
            binary-name: fontmake
          - os: windows-latest
            classifier: windows-x64
            binary-name: fontmake.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Nuitka dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache

      - name: Install Nuitka dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ccache

      - name: Create venv and install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }}
          uv pip install setuptools nuitka==${{ env.NUITKA_VERSION }} fontmake==${{ env.FONTMAKE_VERSION }} cu2qu defcon mutatorMath fs brotli

      - name: Build fontmake with Nuitka
        shell: bash
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          python -m nuitka \
            --mode=standalone \
            --include-package=fontmake \
            --include-package=openstep_plist \
            --include-package=glyphsLib.filters \
            --include-package-data=glyphsLib \
            --include-package-data=cffsubr \
            --noinclude-setuptools-mode=nofollow \
            --noinclude-pytest-mode=nofollow \
            --noinclude-unittest-mode=nofollow \
            --noinclude-pydoc-mode=nofollow \
            --noinclude-IPython-mode=nofollow \
            --nofollow-import-to=doctest \
            --output-filename=${{ matrix.binary-name }} \
            --output-dir=build/nuitka \
            --remove-output \
            --assume-yes-for-downloads \
            src/main/python/fontmake_entry.py

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build/native/${{ matrix.classifier }}
          cp build/nuitka/fontmake_entry.dist/${{ matrix.binary-name }} build/native/${{ matrix.classifier }}/

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/native/${{ matrix.classifier }}
          Copy-Item build/nuitka/fontmake_entry.dist/${{ matrix.binary-name }} build/native/${{ matrix.classifier }}/

      - name: Test binary
        shell: bash
        run: |
          ./build/native/${{ matrix.classifier }}/${{ matrix.binary-name }} --version || true

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.classifier }}
          path: build/native/${{ matrix.classifier }}/${{ matrix.binary-name }}
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: [build-native]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download all native binaries
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-bins/

      - name: Prepare native binaries for publishing
        run: |
          mkdir -p build/native
          for dir in native-bins/native-*; do
            classifier=$(basename "$dir" | sed 's/native-//')
            mkdir -p "build/native/$classifier"
            cp "$dir"/* "build/native/$classifier/"
          done
          ls -la build/native/*/

      - name: Build JARs
        run: |
          # Skip Nuitka build tasks since we have pre-built binaries
          ./gradlew jar sourcesJar plainJavadocJar -Prelease \
            -x installNuitkaDependencies \
            -x buildFontmakeBinary \
            -x copyNativeBinary

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          ./gradlew publishToMavenCentral --no-configuration-cache -Prelease \
            -x installNuitkaDependencies \
            -x buildFontmakeBinary \
            -x copyNativeBinary

  create-release:
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Rename binaries with platform classifier
        run: |
          mkdir -p release-assets
          for dir in artifacts/native-*; do
            classifier=$(basename "$dir" | sed 's/native-//')
            for file in "$dir"/*; do
              filename=$(basename "$file")
              if [[ "$filename" == *.exe ]]; then
                name="${filename%.exe}"
                cp "$file" "release-assets/${name}-${classifier}.exe"
              else
                cp "$file" "release-assets/${filename}-${classifier}"
              fi
            done
          done
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            release-assets/*
