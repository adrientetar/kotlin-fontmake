name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: macos-latest      # Apple Silicon
            binary-name: fontmake
          - os: macos-15-intel    # Intel
            binary-name: fontmake
          - os: ubuntu-latest
            binary-name: fontmake
          - os: windows-latest
            binary-name: fontmake.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Nuitka dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache

      - name: Install Nuitka dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ccache

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.os }}
          path: build/reports/tests/
